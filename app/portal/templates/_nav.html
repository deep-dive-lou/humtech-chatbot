{% macro staff_nav(staff, active='', brand=None) %}
<div class="bg-white border-b border-gray-200 sticky top-0 z-10">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="/portal/staff/" class="text-sm {{ 'font-semibold text-gray-900' if active == 'dashboard' else 'text-gray-400 hover:text-gray-900' }}">Dashboard</a>
      <span class="text-gray-200">|</span>
      <a href="/portal/staff/requests" class="text-sm {{ 'font-semibold text-gray-900' if active == 'requests' else 'text-gray-400 hover:text-gray-900' }}">Requests</a>
      {% if staff.role == "admin" %}
      <span class="text-gray-200">|</span>
      <a href="/portal/staff/templates" class="text-sm {{ 'font-semibold text-gray-900' if active == 'templates' else 'text-gray-400 hover:text-gray-900' }}">Templates</a>
      <span class="text-gray-200">|</span>
      <a href="/portal/staff/settings" class="text-sm {{ 'font-semibold text-gray-900' if active == 'settings' else 'text-gray-400 hover:text-gray-900' }}">Settings</a>
      {% endif %}
    </div>
    <a href="/portal/staff/logout" class="text-sm text-gray-500 hover:text-gray-900">Sign out</a>
  </div>
</div>
{% endmacro %}
